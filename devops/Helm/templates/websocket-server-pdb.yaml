{{- if gt (int .Values.websocket.replicaCount) 1 }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "wafflebear.fullname" . }}-websocket-pdb
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: websocket
      app.kubernetes.io/part-of: wafflebear
{{- end }}
