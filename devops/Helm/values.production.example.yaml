# Production overlay example.
# Copy this file to a private values file and replace every vREPLACE_WITH_BUILD_TAG value.
# For digest deploys, keep tag empty and set digest to sha256:<64 lowercase hex chars>.

backend:
  image:
    tag: "vREPLACE_WITH_BUILD_TAG"
    digest: ""
    pullPolicy: IfNotPresent
  env:
    APP_ADMIN_ONLY: 'false'
    GOOGLE_CLIENT_ID: 'vREPLACE_WITH_GOOGLE_CLIENT_ID'
    NAVER_CLIENT_ID: 'vREPLACE_WITH_NAVER_CLIENT_ID'
    KAKAO_CLIENT_ID: 'vREPLACE_WITH_KAKAO_CLIENT_ID'
    CLIENT_ID: 'vREPLACE_WITH_KAKAO_CLIENT_ID'
    APP_STORAGE_ORPHAN_CLEANUP_ENABLED: 'false'
    APP_STORAGE_ORPHAN_CLEANUP_DRY_RUN: 'true'
    APP_STORAGE_ORPHAN_CLEANUP_INITIAL_DELAY_MS: '600000'
    APP_STORAGE_ORPHAN_CLEANUP_FIXED_DELAY_MS: '86400000'
    APP_STORAGE_ORPHAN_CLEANUP_MAX_SCAN: '10000'
    SPRING_FLYWAY_ENABLED: 'false'
    SPRING_FLYWAY_BASELINE_ON_MIGRATE: 'true'
    SPRING_FLYWAY_VALIDATE_ON_MIGRATE: 'true'
    SPRING_FLYWAY_OUT_OF_ORDER: 'false'
  secretEnv:
    GOOGLE_CLIENT_SECRET: 'vREPLACE_WITH_GOOGLE_CLIENT_SECRET'
    NAVER_CLIENT_SECRET: 'vREPLACE_WITH_NAVER_CLIENT_SECRET'
    KAKAO_CLIENT_SECRET: 'vREPLACE_WITH_KAKAO_CLIENT_SECRET'
    CLIENT_SECRET: 'vREPLACE_WITH_KAKAO_CLIENT_SECRET'

frontend:
  image:
    tag: "vREPLACE_WITH_BUILD_TAG"
    digest: ""
    pullPolicy: IfNotPresent

websocket:
  image:
    tag: "vREPLACE_WITH_BUILD_TAG"
    digest: ""
    pullPolicy: IfNotPresent
