apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
data:
  default.conf: |
    server {
      listen 80;
      charset utf-8;
      underscores_in_headers on;

      location ^~ /assets/ {
        root /usr/share/nginx/html;
        try_files $uri =404;
      }

      location ^~ /src/ {
        return 404;
      }

      location = /favicon.ico {
        root /usr/share/nginx/html;
        try_files $uri =404;
      }

      location = /sw.js {
        root /usr/share/nginx/html;
        try_files $uri =404;
      }

      location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
      }

      location = /api {
        return 404;
      }

      location ^~ /api/ {
        return 404;
      }

      location = /wss {
        return 404;
      }

      location /wss/ {
        return 404;
      }
    }
