server:
  port: 0
  servlet:
    context-path: /api

jwt:
  key: MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY
  expire: 86400000

project:
  aes:
    key: "aessecretkey01234567891011121314"

admin:
  email: admin@fileinnout.local
  name: Administrator
  role: ROLE_ADMIN
  password: admin-password
  additional-users:

app:
  frontend-url: http://localhost
  backend-url: http://localhost/api
  secure-cookie: false
  admin-only: true
  realtime:
    redis-listener:
      enabled: false

portone:
  portone_secret:

spring:
  application:
    name: backend_team_test
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:fileinnout_test;MODE=MariaDB;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1;NON_KEYWORDS=USER
    username: sa
    password:
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        format_sql: false
  sql:
    init:
      mode: never
  data:
    redis:
      host: 127.0.0.1
      port: 6379
  mail:
    host: localhost
    port: 2525
    username: test
    password: test
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: test-google-client
            client-secret: test-google-secret
            scope:
              - email
              - profile
          naver:
            client-id: test-naver-client
            client-secret: test-naver-secret
            redirect-uri: ${app.backend-url}/login/oauth2/code/naver
            scope:
              - name
              - profile
              - email
            authorization-grant-type: authorization_code
          kakao:
            client-id: test-kakao-client
            client-secret: test-kakao-secret
            client-name: kakao
            redirect-uri: ${app.backend-url}/login/oauth2/code/kakao
            authorization-grant-type: authorization_code
            scope: profile_nickname
            client-authentication-method: client_secret_post
        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id
          naver:
            authorization-uri: https://nid.naver.com/oauth2.0/authorize
            token-uri: https://nid.naver.com/oauth2.0/token
            user-info-uri: https://openapi.naver.com/v1/nid/me
            user-name-attribute: response

minio:
  provider: minio
  endpoint: http://127.0.0.1:9000
  public-endpoint: http://127.0.0.1:9000
  access-key: minioadmin
  secret-key: minioadmin
  bucket_cloud: fileinnout-test
  bucket_work: fileinnout-workspace-test
  region: ap-northeast-2
  s3-endpoint: http://127.0.0.1:9000
  s3-public-endpoint: http://127.0.0.1:9000
  s3-access-key: minioadmin
  s3-secret-key: minioadmin
  s3-bucket-cloud: fileinnout-test
  s3-bucket-work: fileinnout-workspace-test
  s3-region: ap-northeast-2
  presigned-url-expiry-seconds: 1800

logging:
  level:
    org.springframework: warn
    org.hibernate: warn
