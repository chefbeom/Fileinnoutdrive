portone:
  portone_secret: ${PORTONE_SECRET}

server:
  port: 8080
  servlet:
    context-path: /api
  error:
    whitelabel:
      enabled: false
    path: /error
  ssl:
    enabled: false

jwt:
  key: ${JWT_KEY}
  expire: ${JWT_EXPIRE}

project:
  aes:
    key: ${PROJECT_AES_KEY}

admin:
  email: ${ADMIN_EMAIL}
  name: ${ADMIN_NAME}
  role: ${ADMIN_ROLE}
  password: ${ADMIN_PASSWORD}
  additional-users: ${ADMIN_ADDITIONAL_USERS:}

app:
  frontend-url: ${APP_FRONTEND_URL:http://localhost}
  backend-url: ${APP_BACKEND_URL:http://localhost/api}
  secure-cookie: ${APP_SECURE_COOKIE:false}
  admin-only: ${APP_ADMIN_ONLY:false}
  cookie:
    same-site: ${APP_COOKIE_SAME_SITE:Lax}
  cors:
    allowed-origin-patterns: ${APP_CORS_ALLOWED_ORIGIN_PATTERNS:}
    allow-development-origin-patterns: ${APP_CORS_ALLOW_DEVELOPMENT_ORIGIN_PATTERNS:false}
  docs:
    public-openapi: ${APP_DOCS_PUBLIC_OPENAPI:false}
  thumbnail:
    executor:
      core-pool-size: ${THUMBNAIL_EXECUTOR_CORE_POOL_SIZE:1}
      max-pool-size: ${THUMBNAIL_EXECUTOR_MAX_POOL_SIZE:2}
      queue-capacity: ${THUMBNAIL_EXECUTOR_QUEUE_CAPACITY:50}
  storage:
    orphan-cleanup:
      enabled: ${APP_STORAGE_ORPHAN_CLEANUP_ENABLED:false}
      dry-run: ${APP_STORAGE_ORPHAN_CLEANUP_DRY_RUN:true}
      initial-delay-ms: ${APP_STORAGE_ORPHAN_CLEANUP_INITIAL_DELAY_MS:600000}
      fixed-delay-ms: ${APP_STORAGE_ORPHAN_CLEANUP_FIXED_DELAY_MS:86400000}
      max-scan: ${APP_STORAGE_ORPHAN_CLEANUP_MAX_SCAN:10000}

notification:
  web-push:
    public-key: ${WEB_PUSH_PUBLIC_KEY:}
    private-key: ${WEB_PUSH_PRIVATE_KEY:}
    subject: ${WEB_PUSH_SUBJECT:mailto:no-reply@fileinnout.local}

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      probes:
        enabled: true

spring:
  flyway:
    enabled: ${SPRING_FLYWAY_ENABLED:false}
    locations: classpath:db/migration
    baseline-on-migrate: ${SPRING_FLYWAY_BASELINE_ON_MIGRATE:true}
    validate-on-migrate: ${SPRING_FLYWAY_VALIDATE_ON_MIGRATE:true}
    out-of-order: ${SPRING_FLYWAY_OUT_OF_ORDER:false}
  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:disabled}
            client-secret: ${GOOGLE_CLIENT_SECRET:disabled}
            redirect-uri: ${app.backend-url}/login/oauth2/code/google
            scope:
              - email
              - profile
          naver:
            client-id: ${NAVER_CLIENT_ID:disabled}
            client-secret: ${NAVER_CLIENT_SECRET:disabled}
            redirect-uri: ${app.backend-url}/login/oauth2/code/naver
            scope:
              - name
              - email
              - profile_image
            authorization-grant-type: authorization_code
          kakao:
            client-id: ${KAKAO_CLIENT_ID:${CLIENT_ID:disabled}}
            client-secret: ${KAKAO_CLIENT_SECRET:${CLIENT_SECRET:disabled}}
            client-name: kakao
            redirect-uri: ${app.backend-url}/login/oauth2/code/kakao
            authorization-grant-type: authorization_code
            scope: profile_nickname
            client-authentication-method: client_secret_post
        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id
          naver:
            authorization-uri: https://nid.naver.com/oauth2.0/authorize
            token-uri: https://nid.naver.com/oauth2.0/token
            user-info-uri: https://openapi.naver.com/v1/nid/me
            user-name-attribute: response
  application:
    name: backend_team

  mail:
    host: smtp.gmail.com
    port: ${MAIL_PORT}
    username: ${MAIL_ID}
    password: ${MAIL_PASS}
    properties:
      mail:
        smtp:
          starttls:
            enable: true
            required: true
          auth: true
          timeout: 5000

  datasource:
    driver-class-name: ${DB_SERVER}
    url: ${DB_URL}
    username: ${DB_ID}
    password: ${DB_PASS}

  jpa:
    database-platform: org.hibernate.dialect.MariaDBDialect
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:validate}
    properties:
      hibernate:
        format_sql: ${HIBERNATE_FORMAT_SQL:false}

minio:
  provider: ${STORAGE_PROVIDER:minio}
  endpoint: ${MINIO_API}
  public-endpoint: ${MINIO_PUBLIC_API:}
  access-key: ${MINIO_NAME}
  secret-key: ${MINIO_SECRET}
  bucket_cloud: ${MINIO_CLOUD_BUCKET}
  bucket_work: ${MINIO_WORKSPACE_BUCKET}
  region: ${MINIO_REGION}
  s3-endpoint: ${S3AMAZON_API}
  s3-public-endpoint: ${S3AMAZON_PUBLIC_API:}
  s3-access-key: ${S3AMAZON_NAME}
  s3-secret-key: ${S3AMAZON_SECRET}
  s3-bucket-cloud: ${S3AMAZON_CLOUD_BUCKET}
  s3-bucket-work: ${S3AMAZON_WORKSPACE_BUCKET}
  s3-region: ${S3AMAZON_REGION}
  presigned-url-expiry-seconds: 1800

logging:
  level:
    root: ${LOG_LEVEL_ROOT:INFO}
    org.springframework.security: ${LOG_LEVEL_SECURITY:INFO}
    org.springframework.web.servlet.DispatcherServlet: ${LOG_LEVEL_DISPATCHER:INFO}
    org.hibernate.SQL: ${LOG_LEVEL_SQL:INFO}
    org.hibernate.orm.jdbc.bind: ${LOG_LEVEL_SQL_BIND:INFO}
