apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "wafflebear.fullname" . }}-frontend-nginx
data:
  default.conf: |
    server {
      listen 80;
      charset utf-8;
      underscores_in_headers on;

      location ^~ /assets/ {
        root /usr/share/nginx/html;
        try_files $uri =404;
      }

      location ^~ /src/ {
        return 404;
      }

      location = /favicon.ico {
        root /usr/share/nginx/html;
        try_files $uri =404;
      }

      location = /sw.js {
        root /usr/share/nginx/html;
        try_files $uri =404;
      }

      location = /version.json {
        default_type application/json;
        add_header Cache-Control "no-store";
        return 200 '{"service":"frontend","version":"{{ .Values.frontend.image.repository }}:{{ .Values.frontend.image.tag }}","podName":"$hostname"}';
      }

      location = /api {
        return 404;
      }

      location ^~ /api/ {
        return 404;
      }

      location = /wss {
        return 404;
      }

      location ^~ /wss/ {
        return 404;
      }

      location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
      }
    }
