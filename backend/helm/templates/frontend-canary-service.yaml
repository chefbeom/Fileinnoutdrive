# Legacy deployment artifact: do not deploy directly. Use devops/Helm as the source of truth.
{{- if false }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "wafflebear.fullname" . }}-frontend-canary
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: frontend
    app.kubernetes.io/part-of: wafflebear
  ports:
    - name: http
      protocol: TCP
      port: {{ .Values.frontend.service.port }}
      targetPort: {{ .Values.frontend.service.port }}
{{- end }}
