apiVersion: v1
kind: Service
metadata:
  name: {{ include "wafflebear.fullname" . }}-backend
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: backend
    app.kubernetes.io/part-of: wafflebear
  ports:
    - name: http
      protocol: TCP
      port: {{ .Values.backend.service.port }}
      targetPort: {{ .Values.backend.service.port }}
