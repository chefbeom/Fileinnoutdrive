# Legacy deployment artifact: do not deploy directly. Use devops/Helm as the source of truth.
{{- if false }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "wafflebear.fullname" . }}
  annotations:
    # 1. Default SSL redirect settings.
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"

    # 2. Disable proxy buffering for SSE and realtime traffic.
    nginx.ingress.kubernetes.io/proxy-buffering: "off"

    # 3. Extra exposed headers and redirect compatibility rules.
    nginx.ingress.kubernetes.io/configuration-snippet: |
      add_header 'Access-Control-Expose-Headers' 'Authorization' always;
      if ($request_uri ~* "^/api$") { return 301 $scheme://$http_host/api/; }
      if ($request_uri ~* "^/wss$") { return 301 $scheme://$http_host/wss/; }

{{- if .Values.ingress.certManagerClusterIssuer }}
    cert-manager.io/cluster-issuer: {{ .Values.ingress.certManagerClusterIssuer | quote }}
{{- end }}
{{- with .Values.ingress.annotations }}
{{ toYaml . | nindent 4 }}
{{- end }}
spec:
  ingressClassName: {{ .Values.ingress.className | quote }}
  rules:
    # Frontend host routing.
    - host: {{ .Values.ingress.hosts.frontend | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "wafflebear.fullname" . }}-frontend
                port:
                  number: {{ .Values.frontend.service.port }}

    # Backend host routing for API, WebSocket, and SSE traffic.
    - host: {{ .Values.ingress.hosts.backend | quote }}
      http:
        paths:
          # 1. STOMP WebSocket and general API traffic handled by backend.
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: {{ include "wafflebear.fullname" . }}-backend
                port:
                  number: {{ .Values.backend.service.port }}

          # 2. Dedicated Yjs WebSocket server path when enabled.
          - path: /wss
            pathType: Prefix
            backend:
              service:
                name: {{ include "wafflebear.fullname" . }}-websocket
                port:
                  number: {{ .Values.websocket.service.port }}

{{- if .Values.ingress.tls.enabled }}
  tls:
    - hosts:
        - {{ .Values.ingress.hosts.frontend | quote }}
        - {{ .Values.ingress.hosts.backend | quote }}
        # Add the apex domain when the certificate covers it.
        - "fileinnoutcloud.kro.kr"
      secretName: {{ .Values.ingress.tls.secretName | quote }}
{{- end }}
{{- end }}
