{{- if and .Values.ingress.enabled (not .Values.ingress.splitResources) }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "wafflebear.fullname" . }}
  annotations:
{{- with .Values.ingress.annotations }}
{{ toYaml . | nindent 4 }}
{{- end }}
spec:
  ingressClassName: {{ .Values.ingress.className | quote }}
  rules:
    - host: {{ .Values.ingress.hosts.frontend | quote }}
      http:
        paths:
          - path: /api/ws-stomp
            pathType: Prefix
            backend:
              service:
                name: {{ include "wafflebear.fullname" . }}-websocket
                port:
                  number: {{ .Values.websocket.service.port }}
          - path: /api/sse
            pathType: Prefix
            backend:
              service:
                name: {{ include "wafflebear.fullname" . }}-websocket
                port:
                  number: {{ .Values.websocket.service.port }}
          - path: /wss
            pathType: Prefix
            backend:
              service:
                name: {{ include "wafflebear.fullname" . }}-websocket
                port:
                  number: {{ .Values.websocket.service.port }}
          - path: /edit
            pathType: Prefix
            backend:
              service:
                name: {{ include "wafflebear.fullname" . }}-websocket
                port:
                  number: {{ .Values.websocket.service.port }}
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: {{ include "wafflebear.fullname" . }}-backend
                port:
                  number: {{ .Values.backend.service.port }}
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "wafflebear.fullname" . }}-frontend
                port:
                  number: {{ .Values.frontend.service.port }}
    - host: {{ .Values.ingress.hosts.backend | quote }}
      http:
        paths:
          - path: /api/ws-stomp
            pathType: Prefix
            backend:
              service:
                name: {{ include "wafflebear.fullname" . }}-websocket
                port:
                  number: {{ .Values.websocket.service.port }}
          - path: /api/sse
            pathType: Prefix
            backend:
              service:
                name: {{ include "wafflebear.fullname" . }}-websocket
                port:
                  number: {{ .Values.websocket.service.port }}
          - path: /wss
            pathType: Prefix
            backend:
              service:
                name: {{ include "wafflebear.fullname" . }}-websocket
                port:
                  number: {{ .Values.websocket.service.port }}
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: {{ include "wafflebear.fullname" . }}-backend
                port:
                  number: {{ .Values.backend.service.port }}
{{- if .Values.ingress.tls.enabled }}
  tls:
    - hosts:
        - {{ .Values.ingress.hosts.frontend | quote }}
        - {{ .Values.ingress.hosts.backend | quote }}
      secretName: {{ .Values.ingress.tls.secretName | quote }}
{{- end }}
{{- end }}
