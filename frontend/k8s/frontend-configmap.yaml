# Legacy deployment artifact: do not deploy directly. Use devops/Helm as the source of truth.
apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
data:
  default.conf: |
    server {
      listen 80;
      charset utf-8;
      underscores_in_headers on;

      location ^~ /assets/ {
        root /usr/share/nginx/html;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri =404;
      }

      location ^~ /src/ {
        return 404;
      }

      location = /favicon.ico {
        root /usr/share/nginx/html;
        try_files $uri =404;
      }

      location = /sw.js {
        root /usr/share/nginx/html;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        try_files $uri =404;
      }

      location = /downloads/FileInNOutDesktop.zip {
        alias /usr/share/nginx/html/downloads/FileInNOutDesktop.zip;
        types { }
        default_type application/zip;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        add_header Content-Disposition "attachment; filename=\"FileInNOutDesktop.zip\"" always;
      }

      location ~ ^/downloads/(?<download_file>FileInNOutDesktop-[A-Za-z0-9._-]+\.zip)$ {
        root /usr/share/nginx/html;
        types { }
        default_type application/zip;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        add_header Content-Disposition "attachment; filename=\"$download_file\"" always;
        try_files $uri =404;
      }

      location = /downloads/FileInNOutDesktopSetup.exe {
        alias /usr/share/nginx/html/downloads/FileInNOutDesktop.zip;
        types { }
        default_type application/zip;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        add_header Content-Disposition "attachment; filename=\"FileInNOutDesktop.zip\"" always;
      }

      location /downloads/ {
        root /usr/share/nginx/html;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        try_files $uri =404;
      }

      location = /index.html {
        root /usr/share/nginx/html;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        try_files $uri =404;
      }

      location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        try_files $uri $uri/ /index.html;
      }

      location = /api {
        return 404;
      }

      location ^~ /api/ {
        return 404;
      }

      location = /wss {
        return 404;
      }

      location /wss/ {
        return 404;
      }
    }
