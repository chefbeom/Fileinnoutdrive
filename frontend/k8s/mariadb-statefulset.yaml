apiVersion: v1
kind: Service
metadata:
  name: mariadb
  labels:
    app: mariadb-stateful
spec:
  ports:
    - port: 3306
  name: mariadb
  clusterIP: None
  selector:
    app: mariadb-stateful
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mariadb
spec:
  serviceName: "mariadb"
  replicas: 1
  selector:
    matchLabels:
      app: mariadb-stateful
  template:
    metadata:
      labels:
        app: mariadb-stateful
    spec:
      containers:
      - name: mariadb
        image: mariadb:11.4
        imagePullPolicy: Always
        args:
        - --character-set-server=utf8mb4
        - --collation-server=utf8mb4_unicode_ci
        ports:
        - containerPort: 3306
          name: mariadb
        env:
        - name: TZ
          valueFrom:
            configMapKeyRef:
              name: backend-config
              key: TZ
        - name: MARIADB_DATABASE
          value: web
        - name: MARIADB_USER
          valueFrom:
            configMapKeyRef:
              name: backend-config
              key: DB_ID
        - name: MARIADB_PASSWORD
          valueFrom:
            configMapKeyRef:
              name: backend-config
              key: DB_PASS
        - name: MARIADB_ROOT_PASSWORD
          valueFrom:
            configMapKeyRef:
              name: backend-config
              key: DB_PASS
        - name: MARIADB_ROOT_HOST
          value: "%"
        - name: MARIADB_AUTO_UPGRADE
          value: "1"
        volumeMounts:
        - name: mariadb-data
          mountPath: /var/lib/mysql
        startupProbe:
          exec:
            command:
            - sh
            - -c
            - mariadb-admin ping -h 127.0.0.1 -uroot -p"$MARIADB_ROOT_PASSWORD" --silent
          failureThreshold: 30
          periodSeconds: 5
        readinessProbe:
          exec:
            command:
            - sh
            - -c
            - mariadb-admin ping -h 127.0.0.1 -uroot -p"$MARIADB_ROOT_PASSWORD" --silent
          initialDelaySeconds: 10
          periodSeconds: 10
        livenessProbe:
          exec:
            command:
            - sh
            - -c
            - mariadb-admin ping -h 127.0.0.1 -uroot -p"$MARIADB_ROOT_PASSWORD" --silent
          initialDelaySeconds: 30
          periodSeconds: 20
        resources:
          requests:
            cpu: "1000m"
            memory: "2Gi"
          limits:
            cpu: "2000m"
            memory: "4Gi"
  volumeClaimTemplates:
  - metadata:
      name: mariadb-data
    spec:
      accessModes:
      - ReadWriteOnce
      storageClassName: "longhorn"
      resources:
        requests:
          storage: 10Gi
