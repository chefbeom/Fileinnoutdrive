<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>FileInNOut Ladder</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f7fafc;
      --panel: #ffffff;
      --ink: #172033;
      --muted: #607089;
      --line: #d9e2ef;
      --accent: #2563eb;
      --accent-strong: #1d4ed8;
      --good: #059669;
      --warn: #b45309;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--ink);
      font-family: Arial, "Noto Sans KR", sans-serif;
    }

    main {
      width: min(1120px, calc(100% - 32px));
      margin: 0 auto;
      padding: 28px 0 36px;
    }

    header {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 18px;
    }

    h1 {
      margin: 0;
      font-size: 28px;
      letter-spacing: 0;
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(280px, 360px) minmax(0, 1fr);
      gap: 16px;
      align-items: start;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 16px;
      box-shadow: 0 12px 30px rgba(23, 32, 51, 0.06);
    }

    label {
      display: block;
      margin: 12px 0 6px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
    }

    input, textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 10px 11px;
      color: var(--ink);
      font: inherit;
      outline: none;
    }

    input:focus, textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.14);
    }

    textarea {
      min-height: 136px;
      resize: vertical;
      line-height: 1.5;
    }

    .actions {
      display: flex;
      gap: 8px;
      margin-top: 14px;
    }

    button {
      border: 0;
      border-radius: 6px;
      padding: 10px 13px;
      background: var(--accent);
      color: #fff;
      font-weight: 700;
      cursor: pointer;
    }

    button.secondary {
      background: #e8eef8;
      color: var(--ink);
    }

    button:hover { background: var(--accent-strong); }
    button.secondary:hover { background: #d9e4f5; }

    .message {
      min-height: 22px;
      margin-top: 10px;
      color: var(--warn);
      font-size: 13px;
      font-weight: 700;
    }

    .board-wrap {
      overflow-x: auto;
    }

    canvas {
      display: block;
      width: 100%;
      min-height: 420px;
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 8px;
    }

    .results {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 8px;
      margin-top: 12px;
    }

    .result {
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 10px;
      background: #fff;
    }

    .result strong {
      display: block;
      margin-bottom: 4px;
      color: var(--good);
    }

    @media (max-width: 760px) {
      main { width: min(100% - 20px, 1120px); padding-top: 18px; }
      header { align-items: start; flex-direction: column; }
      .layout { grid-template-columns: 1fr; }
      h1 { font-size: 23px; }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <h1>FileInNOut Ladder</h1>
    </header>

    <section class="layout">
      <form class="panel" id="ladderForm">
        <label for="count">참여 인원</label>
        <input id="count" type="number" min="2" max="12" value="4" />

        <label for="names">참여자</label>
        <textarea id="names">김민수
박지현
이서준
최유나</textarea>

        <label for="rewards">결과</label>
        <textarea id="rewards">커피 사기
간식 고르기
면제
정리 담당</textarea>

        <div class="actions">
          <button type="submit">실행</button>
          <button class="secondary" type="button" id="shuffleButton">섞기</button>
        </div>
        <p class="message" id="message"></p>
      </form>

      <section class="panel">
        <div class="board-wrap">
          <canvas id="ladder" width="900" height="520"></canvas>
        </div>
        <div class="results" id="results"></div>
      </section>
    </section>
  </main>

  <script>
    const form = document.querySelector('#ladderForm')
    const countInput = document.querySelector('#count')
    const namesInput = document.querySelector('#names')
    const rewardsInput = document.querySelector('#rewards')
    const shuffleButton = document.querySelector('#shuffleButton')
    const message = document.querySelector('#message')
    const canvas = document.querySelector('#ladder')
    const ctx = canvas.getContext('2d')
    const results = document.querySelector('#results')

    const normalizeLines = (value, count, prefix) => {
      const lines = value.split('\n').map((line) => line.trim()).filter(Boolean)
      while (lines.length < count) lines.push(`${prefix} ${lines.length + 1}`)
      return lines.slice(0, count)
    }

    const shuffle = (items) => {
      const copy = [...items]
      for (let i = copy.length - 1; i > 0; i -= 1) {
        const j = Math.floor(Math.random() * (i + 1))
        ;[copy[i], copy[j]] = [copy[j], copy[i]]
      }
      return copy
    }

    const buildBars = (count) => {
      const rows = Math.max(7, count * 3)
      const bars = []
      for (let row = 0; row < rows; row += 1) {
        const used = new Set()
        for (let col = 0; col < count - 1; col += 1) {
          if (used.has(col) || used.has(col - 1)) continue
          if (Math.random() > 0.42) continue
          bars.push({ row, col })
          used.add(col)
        }
      }
      return { rows, bars }
    }

    const trace = (start, bars, rows) => {
      let position = start
      for (let row = 0; row < rows; row += 1) {
        const right = bars.find((bar) => bar.row === row && bar.col === position)
        const left = bars.find((bar) => bar.row === row && bar.col === position - 1)
        if (right) position += 1
        else if (left) position -= 1
      }
      return position
    }

    const draw = (names, rewards, bars, rows, mapping) => {
      const width = Math.max(720, names.length * 138)
      const height = 520
      canvas.width = width
      canvas.height = height
      ctx.clearRect(0, 0, width, height)

      const top = 82
      const bottom = height - 84
      const gap = (width - 120) / (names.length - 1)
      const x = (index) => 60 + gap * index
      const y = (row) => top + ((bottom - top) / rows) * (row + 0.5)

      ctx.font = '700 15px Arial, sans-serif'
      ctx.textAlign = 'center'
      ctx.fillStyle = '#172033'
      names.forEach((name, index) => ctx.fillText(name, x(index), 34))
      rewards.forEach((reward, index) => ctx.fillText(reward, x(index), height - 28))

      ctx.lineWidth = 3
      ctx.strokeStyle = '#94a3b8'
      for (let index = 0; index < names.length; index += 1) {
        ctx.beginPath()
        ctx.moveTo(x(index), top)
        ctx.lineTo(x(index), bottom)
        ctx.stroke()
      }

      ctx.strokeStyle = '#2563eb'
      for (const bar of bars) {
        ctx.beginPath()
        ctx.moveTo(x(bar.col), y(bar.row))
        ctx.lineTo(x(bar.col + 1), y(bar.row))
        ctx.stroke()
      }

      ctx.fillStyle = '#059669'
      ctx.font = '700 12px Arial, sans-serif'
      mapping.forEach((target, index) => {
        ctx.fillText(`${index + 1} → ${target + 1}`, x(index), bottom + 28)
      })
    }

    const run = ({ shuffleRewards = false } = {}) => {
      const count = Math.min(12, Math.max(2, Number(countInput.value) || 2))
      countInput.value = String(count)
      const names = normalizeLines(namesInput.value, count, '참여자')
      const rewards = normalizeLines(rewardsInput.value, count, '결과')
      const finalRewards = shuffleRewards ? shuffle(rewards) : rewards
      const { rows, bars } = buildBars(count)
      const mapping = names.map((_, index) => trace(index, bars, rows))

      draw(names, finalRewards, bars, rows, mapping)
      results.innerHTML = mapping.map((target, index) => `
        <div class="result">
          <strong>${names[index]}</strong>
          <span>${finalRewards[target]}</span>
        </div>
      `).join('')
      message.textContent = ''
    }

    form.addEventListener('submit', (event) => {
      event.preventDefault()
      run()
    })

    shuffleButton.addEventListener('click', () => run({ shuffleRewards: true }))

    run()
  </script>
</body>
</html>
